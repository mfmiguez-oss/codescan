<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>codescan — vulnerability triage</title>
<style>
  :root {
    --bg: #0f1420; --panel: #171d2b; --panel2: #1e2635; --line: #2a3346;
    --txt: #e6ebf5; --muted: #8b97ad; --accent: #4f8cff;
    --crit: #ff4d5e; --high: #ff8a3d; --med: #f5c542; --low: #57b894; --info: #6b7688;
  }
  * { box-sizing: border-box; }
  body { margin: 0; font: 14px/1.5 system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
         background: var(--bg); color: var(--txt); }
  header { display: flex; align-items: center; gap: 16px; padding: 14px 20px;
           background: var(--panel); border-bottom: 1px solid var(--line); position: sticky; top: 0; z-index: 10; }
  header h1 { font-size: 17px; margin: 0; font-weight: 650; letter-spacing: .3px; }
  header h1 .dim { color: var(--muted); font-weight: 400; }
  .grow { flex: 1; }
  button { background: var(--accent); color: #fff; border: 0; border-radius: 6px;
           padding: 8px 14px; font-weight: 600; cursor: pointer; }
  button.ghost { background: transparent; border: 1px solid var(--line); color: var(--txt); }
  button:disabled { opacity: .5; cursor: default; }
  .chips { display: flex; gap: 10px; flex-wrap: wrap; }
  .chip { background: var(--panel2); border: 1px solid var(--line); border-radius: 20px;
          padding: 4px 12px; font-size: 12px; color: var(--muted); }
  .chip b { color: var(--txt); }
  .toolbar { display: flex; gap: 10px; align-items: center; padding: 12px 20px;
             background: var(--panel); border-bottom: 1px solid var(--line); flex-wrap: wrap; }
  input, select { background: var(--panel2); border: 1px solid var(--line); color: var(--txt);
                  border-radius: 6px; padding: 7px 10px; font: inherit; }
  input[type=search] { min-width: 220px; }
  label.f { display: flex; gap: 6px; align-items: center; color: var(--muted); font-size: 12px; }
  main { padding: 16px 20px 60px; }
  table { width: 100%; border-collapse: collapse; }
  th { text-align: left; color: var(--muted); font-weight: 600; font-size: 12px;
       text-transform: uppercase; letter-spacing: .4px; padding: 8px 10px; border-bottom: 1px solid var(--line); }
  td { padding: 10px; border-bottom: 1px solid var(--line); vertical-align: middle; }
  tr.row { cursor: pointer; }
  tr.row:hover { background: var(--panel); }
  .risk { display: inline-flex; align-items: center; justify-content: center; min-width: 42px;
          padding: 4px 8px; border-radius: 6px; font-weight: 700; color: #0b0f18; }
  .sev { font-size: 11px; text-transform: uppercase; font-weight: 700; letter-spacing: .4px; }
  .badge { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 11px;
           background: var(--panel2); border: 1px solid var(--line); color: var(--muted); margin-right: 4px; }
  .badge.kev { background: #3a1620; border-color: var(--crit); color: #ffb3bb; }
  .badge.chain { background: #16233a; border-color: var(--accent); color: #b9d2ff; }
  .badge.ok { background: #16261a; border-color: #2f8f4e; color: #a7e0b8; }
  .badge.src { text-transform: uppercase; }
  .muted { color: var(--muted); }
  select.state { padding: 5px 8px; }
  /* drawer */
  .drawer { position: fixed; top: 0; right: 0; height: 100%; width: 520px; max-width: 92vw;
            background: var(--panel); border-left: 1px solid var(--line); transform: translateX(100%);
            transition: transform .18s ease; overflow-y: auto; z-index: 20; padding: 20px; }
  .drawer.open { transform: translateX(0); }
  .drawer h2 { margin: 0 0 4px; font-size: 16px; }
  .drawer .close { position: absolute; top: 14px; right: 16px; background: none; color: var(--muted);
                   border: 0; font-size: 22px; cursor: pointer; padding: 0; }
  .kv { display: grid; grid-template-columns: 130px 1fr; gap: 6px 12px; margin: 14px 0; }
  .kv .k { color: var(--muted); }
  .section { margin-top: 18px; padding-top: 14px; border-top: 1px solid var(--line); }
  .section h3 { font-size: 12px; text-transform: uppercase; color: var(--muted); letter-spacing: .5px; margin: 0 0 8px; }
  .rationale { background: var(--panel2); border: 1px solid var(--line); border-radius: 8px;
               padding: 12px; white-space: pre-wrap; }
  .chaincard { background: var(--panel2); border: 1px solid var(--line); border-left: 3px solid var(--accent);
               border-radius: 8px; padding: 12px; margin-bottom: 10px; }
  .chaincard .cscore { float: right; font-weight: 700; }
  a { color: var(--accent); }
  .backdrop { position: fixed; inset: 0; background: rgba(0,0,0,.45); z-index: 15; display: none; }
  .backdrop.open { display: block; }
  .empty { text-align: center; color: var(--muted); padding: 40px; }
  /* nav tabs */
  nav#nav { display: flex; gap: 4px; }
  .tab { background: transparent; border: 1px solid transparent; color: var(--muted);
         padding: 6px 12px; border-radius: 6px; font-weight: 600; }
  .tab.active { background: var(--panel2); color: var(--txt); border-color: var(--line); }
  /* config */
  .cfg { max-width: 900px; }
  .card { background: var(--panel); border: 1px solid var(--line); border-radius: 10px;
          padding: 16px 18px; margin-bottom: 16px; }
  .card h4 { margin: 0 0 4px; font-size: 14px; }
  .card p.hint { margin: 0 0 12px; color: var(--muted); font-size: 12px; }
  .formrow { display: flex; align-items: center; gap: 12px; margin: 8px 0; }
  .formrow > label { width: 210px; color: var(--muted); flex: none; }
  .formrow input[type=number], .formrow input[type=text] { width: 160px; }
  .formrow.ro span { color: var(--txt); }
  .grid3 { display: grid; grid-template-columns: 130px repeat(3, 1fr); gap: 8px 10px; align-items: center; }
  .grid3 .h { color: var(--muted); font-size: 12px; }
  .grid5 { display: grid; grid-template-columns: 110px 1fr 1.5fr 1fr 1fr; gap: 8px 10px; align-items: center; }
  .grid5 .h { color: var(--muted); font-size: 12px; }
  .grid5 input { width: 100%; }
  .toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
           background: #1e293b; border: 1px solid var(--accent); color: #fff; padding: 10px 18px;
           border-radius: 8px; opacity: 0; pointer-events: none; transition: opacity .2s; z-index: 30; }
  .toast.show { opacity: 1; }
  .banner { background: #3a1620; border-bottom: 1px solid var(--crit); color: #ffb3bb;
            padding: 9px 20px; font-size: 13px; }
  .chip.live { border-color: var(--high); color: #ffd0ad; }
  /* threats */
  .tm { margin-bottom: 20px; }
  .tm .head { display: flex; align-items: baseline; gap: 12px; margin-bottom: 6px; }
  .tm .head h3 { margin: 0; font-size: 15px; }
  .rl { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .4px;
        padding: 3px 9px; border-radius: 5px; color: #0b0f18; }
  .stride { text-transform: uppercase; font-size: 10px; letter-spacing: .3px;
            background: #2a2140; border: 1px solid #6d5bd0; color: #cfc3ff; }
  .lozenge { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 11px;
             background: var(--panel2); border: 1px solid var(--line); color: var(--muted); margin: 2px 4px 2px 0; }
  .fref { cursor: pointer; color: var(--accent); }
  /* overview */
  .ovgrid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 12px; margin-bottom: 16px; }
  .metric { background: var(--panel); border: 1px solid var(--line); border-radius: 10px;
            padding: 16px; text-align: center; }
  .metric .mnum { font-size: 28px; font-weight: 700; line-height: 1; }
  .metric .mlabel { color: var(--muted); font-size: 12px; margin-top: 6px; }
  .segbar { display: flex; height: 14px; border-radius: 7px; overflow: hidden; border: 1px solid var(--line); }
  .segbar .segpart { height: 100%; }
  .qa { display: flex; flex-wrap: wrap; gap: 10px; }
  .usage { margin: 0; padding-left: 20px; line-height: 1.9; }
  .usage b { color: var(--txt); }
  .usage a { cursor: pointer; }
</style>
</head>
<body>
<header>
  <h1>codescan <span class="dim">/ vulnerability triage</span></h1>
  <nav id="nav">
    <button class="tab active" data-view="overview">Overview</button>
    <button class="tab" data-view="findings">Findings</button>
    <button class="tab" data-view="threats">Threats</button>
    <button class="tab" data-view="calibration">Calibration</button>
    <button class="tab" data-view="audit">Audit</button>
    <button class="tab" data-view="config">Config</button>
  </nav>
  <div class="chips" id="chips"></div>
  <div class="grow"></div>
  <label class="f"><input type="checkbox" id="opt-ai" /> AI</label>
  <label class="f"><input type="checkbox" id="opt-offline" checked /> offline</label>
  <label class="f" title="Scan live Bitbucket/Snyk/Xray instead of fixtures"><input type="checkbox" id="opt-live" /> live</label>
  <input type="text" id="opt-repos" style="width:210px" placeholder="GitHub repos: owner/name, …" title="Scope this scan to specific GitHub repos (owner/name, comma-separated). One-shot — doesn't change the configured source." />
  <label class="f" title="Also review the targeted repos' source with the built-in OpenHack whitebox engine (clones them; needs AI on)"><input type="checkbox" id="opt-wb" /> whitebox</label>
  <button id="scan">Run scan</button>
</header>

<div class="banner" id="banner" style="display:none"></div>

<div class="toolbar" id="toolbar">
  <input type="search" id="q" placeholder="Search title, CVE, component…" />
  <label class="f">severity
    <select id="f-sev"><option value="">all</option></select>
  </label>
  <label class="f">state
    <select id="f-state"><option value="">all</option></select>
  </label>
  <label class="f">repo
    <select id="f-repo"><option value="">all</option></select>
  </label>
  <label class="f">min risk <span id="minlabel">0</span>
    <input type="range" id="f-min" min="0" max="100" value="0" />
  </label>
  <div class="grow"></div>
  <button class="ghost" id="chainsBtn">Attack chains (0)</button>
</div>

<main>
  <section id="overviewView" class="cfg" style="display:none"></section>
  <div id="findingsView">
    <table>
      <thead><tr>
        <th>Risk</th><th>Sev</th><th>Validation state</th><th>Title</th>
        <th>Repo</th><th>Component</th><th>Signals</th>
      </tr></thead>
      <tbody id="rows"></tbody>
    </table>
    <div class="empty" id="empty" style="display:none">No findings match the filters.</div>
  </div>
  <section id="threatsView" class="cfg" style="display:none"></section>
  <section id="calibrationView" class="cfg" style="display:none"></section>
  <section id="auditView" class="cfg" style="display:none"></section>
  <section id="configView" class="cfg" style="display:none"></section>
</main>

<div class="backdrop" id="backdrop"></div>
<aside class="drawer" id="drawer"></aside>
<div class="toast" id="toast"></div>

<script>
const $ = (s) => document.querySelector(s);
let DATA = { findings: [], chains: [], threat_models: [], states: [], summary: {} };
let CHAINS_BY_ID = {};
let THREATS_BY_FINDING = {};

const riskColor = (s) => s >= 85 ? 'var(--crit)' : s >= 70 ? 'var(--high)' : s >= 40 ? 'var(--med)' : s > 0 ? 'var(--low)' : 'var(--info)';
const riskColorName = (rl) => ({critical:'var(--crit)',high:'var(--high)',medium:'var(--med)',low:'var(--low)'}[rl] || 'var(--info)');
const sevColor = (s) => ({critical:'var(--crit)',high:'var(--high)',medium:'var(--med)',low:'var(--low)',info:'var(--info)'}[s] || 'var(--info)');
const esc = (t) => (t ?? '').toString().replace(/[&<>]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));

async function load(payload) {
  DATA = payload;
  syncMode();
  CHAINS_BY_ID = Object.fromEntries((DATA.chains || []).map(c => [c.chain_id, c]));
  THREATS_BY_FINDING = {};
  (DATA.threat_models || []).forEach(tm => (tm.threats || []).forEach(t => {
    t._service = tm.service;
    (t.related_finding_ids || []).forEach(fid => { (THREATS_BY_FINDING[fid] ||= []).push(t); });
  }));
  const nThreats = (DATA.threat_models || []).reduce((n, tm) => n + (tm.threats || []).length, 0);
  document.querySelector('.tab[data-view="threats"]').textContent = nThreats ? `Threats (${nThreats})` : 'Threats';
  renderChips();
  fillFilter('#f-sev', ['critical','high','medium','low','info']);
  fillFilter('#f-state', DATA.states);
  fillFilter('#f-repo', [...new Set(DATA.findings.map(f => f.repo))].sort());
  $('#chainsBtn').textContent = `Attack chains (${(DATA.chains||[]).length})`;
  render();
  // Refresh whichever non-findings view is active (e.g. after a scan).
  const active = document.querySelector('.tab.active')?.dataset.view;
  if (active === 'overview') renderOverview();
  else if (active === 'threats') renderThreats();
}

function syncMode() {
  const m = DATA.mode || {};
  $('#opt-ai').checked = !!m.use_ai;
  $('#opt-offline').checked = !!m.offline;
  $('#opt-live').checked = !!m.live;
  const b = $('#banner');
  if (DATA.startup_error) { b.textContent = '⚠ Last scan failed: ' + DATA.startup_error; b.style.display = 'block'; }
  else { b.style.display = 'none'; }
}

function renderChips() {
  const s = DATA.summary || {};
  const sev = s.by_severity || {};
  const when = DATA.last_scan ? new Date(DATA.last_scan).toLocaleTimeString() : null;
  $('#chips').innerHTML = [
    `<span class="chip"><b>${s.findings||0}</b> findings</span>`,
    `<span class="chip"><b>${s.repos||0}</b> repos</span>`,
    `<span class="chip" style="border-color:var(--crit)"><b>${s.kev||0}</b> KEV</span>`,
    (s.threats ? `<span class="chip"><b>${s.threats}</b> threats</span>` : ''),
    `<span class="chip"><b>${sev.critical||0}</b> crit · <b>${sev.high||0}</b> high · <b>${sev.medium||0}</b> med</span>`,
    ((DATA.mode||{}).live ? '<span class="chip live">live</span>' : ''),
    (when ? `<span class="chip">last run ${when}</span>` : ''),
  ].join('');
}

function fillFilter(sel, values) {
  const el = $(sel), cur = el.value;
  el.innerHTML = '<option value="">all</option>' + values.map(v => `<option>${esc(v)}</option>`).join('');
  el.value = cur;
}

function filtered() {
  const q = $('#q').value.toLowerCase();
  const sev = $('#f-sev').value, st = $('#f-state').value, repo = $('#f-repo').value;
  const min = +$('#f-min').value;
  return DATA.findings.filter(f => {
    if (sev && f.severity !== sev) return false;
    if (st && f.validation_state !== st) return false;
    if (repo && f.repo !== repo) return false;
    if (f.risk_score < min) return false;
    if (q) {
      const hay = (f.title + ' ' + f.cve_ids.join(' ') + ' ' + f.component + ' ' + f.repo).toLowerCase();
      if (!hay.includes(q)) return false;
    }
    return true;
  });
}

function render() {
  const list = filtered();
  $('#empty').style.display = list.length ? 'none' : 'block';
  $('#rows').innerHTML = list.map(f => {
    const ex = f.exploitability;
    const tags = f.tags || [];
    const signals = [
      ex.in_kev ? '<span class="badge kev">KEV</span>' : '',
      ex.chain_ids.length ? `<span class="badge chain">chain×${ex.chain_ids.length}</span>` : '',
      tags.includes('corroborated') ? '<span class="badge ok" title="Found in every OpenHack whitebox review pass">corroborated</span>' : '',
      tags.includes('feedback-adjusted') ? '<span class="badge" title="Risk score calibrated by the analyst-feedback prior">feedback</span>' : '',
      ex.epss != null ? `<span class="badge">EPSS ${(ex.epss*100).toFixed(0)}%</span>` : '',
      f.sources.map(s => `<span class="badge src">${esc(s)}</span>`).join(''),
    ].join('');
    return `<tr class="row" data-id="${f.id}">
      <td><span class="risk" style="background:${riskColor(f.risk_score)}">${f.risk_score.toFixed(0)}</span></td>
      <td><span class="sev" style="color:${sevColor(f.severity)}">${f.severity}</span></td>
      <td>${stateSelect(f)}</td>
      <td>${esc(f.title)}<div class="muted" style="font-size:12px">${esc(f.cve_ids.join(', '))}</div></td>
      <td class="muted">${esc(f.repo)}</td>
      <td class="muted">${esc(f.component)}<div style="font-size:12px">${esc(f.version||'')}</div></td>
      <td>${signals}</td>
    </tr>`;
  }).join('');
  $('#rows').querySelectorAll('tr.row').forEach(tr => {
    tr.addEventListener('click', (e) => {
      if (e.target.closest('select')) return;
      openDrawer(tr.dataset.id);
    });
  });
  $('#rows').querySelectorAll('select.state').forEach(sel => {
    sel.addEventListener('change', () => changeState(sel.dataset.id, sel.value));
  });
}

function stateSelect(f) {
  const opts = DATA.states.map(s => `<option value="${s}" ${s===f.validation_state?'selected':''}>${s.replace(/_/g,' ')}</option>`).join('');
  return `<select class="state" data-id="${f.id}" onclick="event.stopPropagation()">${opts}</select>`;
}

async function changeState(id, state, note) {
  // A quick state change (row select) keeps whatever note the analyst left;
  // the drawer's Apply passes the note field explicitly (possibly cleared).
  if (note === undefined) {
    const f = DATA.findings.find(x => x.id === id);
    note = (f && f.analyst_note) || '';
  }
  const r = await fetch(`/api/findings/${id}/state`, {
    method: 'POST', headers: {'Content-Type':'application/json'},
    body: JSON.stringify({state, note})
  });
  if (!r.ok) { alert('Failed to update state'); return; }
  const updated = await r.json();
  const i = DATA.findings.findIndex(f => f.id === id);
  if (i >= 0) DATA.findings[i] = updated;
  if ($('#drawer').classList.contains('open') && $('#drawer').dataset.id === id) openDrawer(id);
}

function applyTriage(id) {
  changeState(id, $('#drawer-state').value, $('#drawer-note').value.trim());
  toast('Triage decision saved', true);
}

function openDrawer(id) {
  const f = DATA.findings.find(x => x.id === id);
  if (!f) return;
  const ex = f.exploitability;
  const chains = ex.chain_ids.map(cid => CHAINS_BY_ID[cid]).filter(Boolean);
  const drawer = $('#drawer');
  drawer.dataset.id = id;
  drawer.innerHTML = `
    <button class="close" onclick="closeDrawer()">×</button>
    <h2>${esc(f.title)}</h2>
    <div class="muted">${esc(f.cve_ids.join(', ') || 'no CVE')} · ${esc(f.cwe_ids.join(', '))}</div>
    <div style="margin-top:10px"><span class="risk" style="background:${riskColor(f.risk_score)};min-width:56px">${f.risk_score.toFixed(0)}</span>
      <span class="badge">${f.servicenow_state}</span>
      ${ex.in_kev?'<span class="badge kev">KEV — actively exploited</span>':''}</div>
    <div class="kv">
      <div class="k">Component</div><div>${esc(f.component)} ${esc(f.version||'')}</div>
      <div class="k">Repository</div><div>${esc(f.repo)}</div>
      <div class="k">Location</div><div class="muted">${esc(f.path||'—')}</div>
      <div class="k">CVSS</div><div>${f.cvss_score ?? '—'} <span class="muted">${esc(f.cvss_vector||'')}</span></div>
      <div class="k">EPSS</div><div>${ex.epss!=null?(ex.epss*100).toFixed(1)+'%':'—'}</div>
      <div class="k">Reachable</div><div>${ex.reachable===true?'yes':ex.reachable===false?'no':'unknown'}</div>
      <div class="k">Reported by</div><div>${f.sources.map(s=>`<span class="badge src">${esc(s)}</span>`).join('')}</div>
      <div class="k">Fixed in</div><div>${esc(f.fixed_in.join(', ')||'—')}</div>
    </div>
    <div class="section">
      <h3>Triage</h3>
      <div style="display:flex;gap:8px;flex-wrap:wrap;align-items:center">
        <select id="drawer-state">${DATA.states.map(s => `<option value="${s}" ${s===f.validation_state?'selected':''}>${s.replace(/_/g,' ')}</option>`).join('')}</select>
        <input id="drawer-note" type="text" maxlength="300" placeholder="Why? Optional note — kept with the decision and shown to the AI on similar findings" value="${esc(f.analyst_note||'')}" style="flex:1;min-width:220px" />
        <button onclick="applyTriage('${f.id}')">Apply</button>
      </div>
    </div>
    <div class="section">
      <h3>Exploitability — ${esc(ex.level)} (${ex.score.toFixed(0)}/100)</h3>
      <div class="rationale">${esc(ex.rationale || 'No AI rationale (run a scan with AI enabled).')}</div>
    </div>
    ${f.remediation ? `<div class="section"><h3>Remediation</h3><div class="rationale">${esc(f.remediation)}</div></div>` : ''}
    ${(f.tags && f.tags.length) ? `<div class="section"><h3>Tags</h3>${f.tags.map(t=>`<span class="badge">${esc(t)}</span>`).join('')}</div>` : ''}
    ${(THREATS_BY_FINDING[f.id]||[]).length ? `<div class="section"><h3>Threats</h3>${THREATS_BY_FINDING[f.id].map(threatItem).join('')}</div>` : ''}
    ${chains.length ? `<div class="section"><h3>Attack chains</h3>${chains.map(chainCard).join('')}</div>` : ''}
    <div class="section">
      <h3>Description</h3>
      <div class="muted" style="white-space:pre-wrap">${esc(f.description||'—')}</div>
    </div>
    ${f.references.length ? `<div class="section"><h3>References</h3>${f.references.map(r=>`<div><a href="${esc(r)}" target="_blank" rel="noopener">${esc(r)}</a></div>`).join('')}</div>` : ''}
  `;
  drawer.classList.add('open');
  $('#backdrop').classList.add('open');
}

function chainCard(c) {
  const dismissed = c.validation_state === 'false_positive';
  const triage = c.fingerprint ? `
    <div style="margin-top:8px" onclick="event.stopPropagation()">
      <select onchange="changeChainState('${esc(c.fingerprint)}', this.value)" title="Analyst judgement on this chain — persists across rescans; a dismissed chain stops influencing scores and the export">
        ${['new','confirmed','false_positive'].map(s => `<option value="${s}" ${s===(c.validation_state||'new')?'selected':''}>${s.replace(/_/g,' ')}</option>`).join('')}
      </select>
      ${dismissed ? '<span class="badge" style="margin-left:6px">dismissed — not counted in scores or export</span>' : ''}
    </div>` : '';
  return `<div class="chaincard" style="${dismissed ? 'opacity:.55' : ''}">
    <span class="cscore" style="color:${riskColor(c.chain_score)}">${c.chain_score}</span>
    <b>${esc(c.chain_id)}</b> <span class="muted">· ${esc(c.likelihood)} likelihood</span>
    <div style="margin:6px 0">${esc(c.narrative)}</div>
    <div class="muted"><b>Preconditions:</b> ${esc(c.preconditions)}</div>
    <div class="muted"><b>Impact:</b> ${esc(c.impact)}</div>
    ${(c.mitre_attack||[]).length?`<div style="margin-top:6px">${c.mitre_attack.map(m=>`<span class="badge">${esc(m)}</span>`).join('')}</div>`:''}
    ${triage}
  </div>`;
}

async function changeChainState(fingerprint, state) {
  const r = await fetch(`/api/chains/${fingerprint}/state`, {
    method: 'POST', headers: {'Content-Type':'application/json'},
    body: JSON.stringify({state, note: ''})
  });
  if (!r.ok) { toast('Failed to update chain', false); return; }
  const updated = await r.json();
  const i = DATA.chains.findIndex(c => c.fingerprint === fingerprint);
  if (i >= 0) DATA.chains[i] = updated;
  CHAINS_BY_ID[updated.chain_id] = updated;
  // Refresh whichever surface is showing the card.
  if ($('#drawer').classList.contains('open')) {
    const fid = $('#drawer').dataset.id;
    fid ? openDrawer(fid) : openChains();
  }
  toast(state === 'false_positive' ? 'Chain dismissed — scores update on the next scan' : 'Chain decision saved', true);
}

async function renderCalibration() {
  const el = $('#calibrationView');
  el.innerHTML = '<div class="card"><h4>Score calibration</h4><p class="hint">Loading…</p></div>';
  let r;
  try { r = await (await fetch('/api/calibration')).json(); }
  catch (err) {
    el.innerHTML = `<div class="card"><h4>Score calibration</h4><div class="empty">Failed to load: ${esc(String(err))}</div></div>`;
    return;
  }
  const intro = `<p class="hint">Grades past risk scores against analysts' manual <b>confirmed</b> / <b>false positive</b> decisions (the same ground truth the feedback prior learns from). A well-calibrated pipeline shows a confirm rate that rises with the predicted-score bucket.</p>`;
  if (!r.decisions) {
    el.innerHTML = `<div class="card"><h4>Score calibration</h4>${intro}
      <div class="empty">No manual confirmed / false-positive decisions yet. Triage findings in <a class="fref" onclick="switchView('findings')">Findings</a> and come back.</div></div>`;
    return;
  }
  const pct = (v) => v === null || v === undefined ? '—' : Math.round(v * 100) + '%';
  const metric = (n, label, color) => `<div class="metric"><div class="mnum" style="color:${color || 'var(--txt)'}">${n}</div><div class="mlabel">${label}</div></div>`;
  const sep = (r.mean_score_confirmed !== null && r.mean_score_false_positive !== null)
    ? (r.mean_score_confirmed - r.mean_score_false_positive).toFixed(1) : null;
  const rows = r.buckets.map(b => `<tr>
      <td>${esc(b.bucket)}</td>
      <td style="text-align:right">${b.total}</td>
      <td style="text-align:right">${b.confirmed}</td>
      <td style="text-align:right">${b.false_positive}</td>
      <td style="text-align:right">${pct(b.confirm_rate)}</td>
      <td style="width:40%">${b.confirm_rate === null ? '' :
        `<div class="segbar" style="max-width:260px"><span class="segpart" style="flex:${b.confirm_rate};background:var(--high)"></span><span class="segpart" style="flex:${1 - b.confirm_rate};background:var(--panel2)"></span></div>`}</td>
    </tr>`).join('');
  const noisy = (r.noisy_keys || []).map(k =>
    `<li><b>${esc(k.key)}</b> — ${k.false_positive} false positive vs ${k.confirmed} confirmed (${pct(k.fp_rate)} FP rate)</li>`).join('');
  const alerts = (r.alerts || []).map(a =>
    `<div class="rationale" style="margin-top:8px;border-color:var(--crit);color:#ffb3bb">⚠ ${esc(a)}</div>`).join('');
  el.innerHTML = `
    <div class="card"><h4>Score calibration</h4>${intro}${alerts}</div>
    <div class="ovgrid">
      ${metric(r.decisions, 'manual decisions')}
      ${metric(r.confirmed, 'confirmed', 'var(--high)')}
      ${metric(r.false_positives, 'false positives', 'var(--med)')}
      ${metric(pct(r.confirm_rate), 'confirm rate')}
      ${sep !== null ? metric(sep, 'score separation (confirmed − FP)', 'var(--accent)') : ''}
    </div>
    <div class="card">
      <h4>Confirm rate by predicted risk score</h4>
      <table><thead><tr><th>Predicted score</th><th style="text-align:right">Decisions</th><th style="text-align:right">Confirmed</th><th style="text-align:right">False positives</th><th style="text-align:right">Confirm rate</th><th></th></tr></thead>
      <tbody>${rows}</tbody></table>
      ${r.unscored ? `<p class="hint" style="margin-top:8px">${r.unscored} decision(s) predate score snapshots and are excluded from the buckets.</p>` : ''}
    </div>
    ${noisy ? `<div class="card"><h4>Noisiest weakness families / components</h4>
      <p class="hint">Mostly dismissed as false positives — candidates for scanner tuning; the feedback prior is already nudging these down.</p>
      <ul style="margin:0;padding-left:18px;line-height:1.9">${noisy}</ul></div>` : ''}
  `;
}

function renderThreats() {

function tmCard(tm) {
  const rl = tm.risk_level || 'low';
  const loz = (arr, fmt) => (arr || []).map(fmt).join('');
  const assets = loz(tm.assets, a => `<span class="lozenge">${esc(a.name)}${a.sensitivity ? ` · ${esc(a.sensitivity)}` : ''}</span>`);
  const entries = loz(tm.entry_points, e => `<span class="lozenge">${esc(e.name)}</span>`);
  const bounds = loz(tm.trust_boundaries, b => `<span class="lozenge">${esc(b)}</span>`);
  const recs = loz(tm.recommendations, r => `<li>${esc(r)}</li>`);
  return `<div class="card tm">
    <div class="head"><h3>${esc(tm.service)}</h3>
      <span class="rl" style="background:${riskColorName(rl)}">${esc(rl)}</span>
      <span class="muted">${(tm.threats || []).length} threats</span></div>
    <p class="hint" style="font-size:13px">${esc(tm.posture_summary || '')}</p>
    ${assets ? `<div class="section"><h3>Assets</h3>${assets}</div>` : ''}
    ${entries ? `<div class="section"><h3>Entry points</h3>${entries}</div>` : ''}
    ${bounds ? `<div class="section"><h3>Trust boundaries</h3>${bounds}</div>` : ''}
    <div class="section"><h3>Threats</h3>${(tm.threats || []).map(threatItem).join('') || '<span class="muted">none</span>'}</div>
    ${recs ? `<div class="section"><h3>Recommendations</h3><ul style="margin:0;padding-left:18px">${recs}</ul></div>` : ''}
  </div>`;
}

function threatItem(t) {
  const refs = (t.related_finding_ids || []).map(fid => {
    const f = DATA.findings.find(x => x.id === fid);
    return `<span class="fref" onclick="openDrawer('${fid}')">${esc(f ? f.title : fid.slice(0, 8))}</span>`;
  }).join(', ');
  const chainRefs = (t.related_chain_ids || []).map(c => `<span class="badge chain">${esc(c)}</span>`).join('');
  const mit = (t.mitigations || []).map(m => `<li>${esc(m)}</li>`).join('');
  return `<div class="chaincard">
    <b>${esc(t.title)}</b> <span class="badge stride">${esc(t.stride)}</span>
    <span class="muted">· ${esc(t.likelihood)} likelihood</span>
    <div style="margin:6px 0">${esc(t.description)}</div>

async function runScan() {
  const btn = $('#scan'); btn.disabled = true; btn.textContent = 'Scanning…';
  try {
    const repos = splitList($('#opt-repos').value);
    const r = await fetch('/api/scan', {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({
        use_ai: $('#opt-ai').checked, offline: $('#opt-offline').checked, live: $('#opt-live').checked,
        repos: repos.length ? repos : null, whitebox: $('#opt-wb').checked,
      })
    });
    if (!r.ok) throw new Error(await r.text());
    await load(await r.json());
    toast(DATA.startup_error ? 'Scan failed — see banner' : 'Scan complete', !DATA.startup_error);
  } catch (e) { toast('Scan failed: ' + e.message, false); }
  finally { btn.disabled = false; btn.textContent = 'Run scan'; }
}

function switchView(view) {
  document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.view === view));
  $('#toolbar').style.display = view === 'findings' ? 'flex' : 'none';
  $('#overviewView').style.display = view === 'overview' ? 'block' : 'none';
  $('#findingsView').style.display = view === 'findings' ? 'block' : 'none';
  $('#threatsView').style.display = view === 'threats' ? 'block' : 'none';
  $('#calibrationView').style.display = view === 'calibration' ? 'block' : 'none';
  $('#auditView').style.display = view === 'audit' ? 'block' : 'none';
  $('#configView').style.display = view === 'config' ? 'block' : 'none';
  if (view === 'config' && !CONFIG) loadConfig();
  if (view === 'audit') renderAudit();
  if (view === 'calibration') renderCalibration();
  if (view === 'threats') renderThreats();
  if (view === 'overview') renderOverview();
}

}

    <div class="card">
      <h4>OpenHack (whitebox source review)</h4>
      <p class="hint">Whitebox <a href="https://github.com/hadriansecurity/openhack" target="_blank" rel="noopener">OpenHack</a>-style review of repo source — covers repos Snyk/Xray haven't scanned. Auto-run uses codescan's <strong>built-in engine</strong> (needs AI on) unless you set an external command. Current mode: <strong>${esc(c.openhack.engine || 'built-in')}</strong>.</p>
      <div class="formrow"><label>Enable OpenHack</label><input type="checkbox" id="oh-enabled" ${c.openhack.enabled ? 'checked' : ''}/> <span class="muted" style="font-size:12px">ingest findings from a run dir</span></div>
      <div class="formrow"><label>Findings dir</label><input type="text" id="oh-dir" style="width:360px" value="${esc(c.openhack.findings_dir || '')}" placeholder="path to OpenHack run dir or finding-candidates/"/></div>
      <div class="formrow"><label>Repo</label><input type="text" id="oh-repo" style="width:360px" value="${esc(c.openhack.repo || '')}" placeholder="owner/name — empty = first scanned repo"/></div>
      <div class="formrow"><label>Auto-run</label><input type="checkbox" id="oh-auto" ${c.openhack.auto ? 'checked' : ''}/> <span class="muted" style="font-size:12px">review source during a live scan, then ingest</span></div>
      <div class="formrow"><label>Command</label><input type="text" id="oh-cmd" style="width:420px" value="${esc(c.openhack.command || '')}" placeholder="empty = built-in engine · or: bash run_openhack.sh {repo_path} {output_dir}"/></div>
      <div class="formrow"><label>Workspace</label><input type="text" id="oh-ws" style="width:260px" value="${esc(c.openhack.workspace || '')}" placeholder=".openhack"/></div>
      <div class="formrow"><label>Clone repo first</label><input type="checkbox" id="oh-clone" ${c.openhack.clone ? 'checked' : ''}/></div>
      <div class="formrow"><label>Review passes</label><input type="number" id="oh-passes" style="width:100px" value="${c.openhack.passes || 2}"/> <span class="muted" style="font-size:12px">≥2 unions findings across passes (higher recall) + flags agreement</span></div>
      <div class="formrow"><label>Max files</label><input type="number" id="oh-maxfiles" style="width:100px" value="${c.openhack.max_files || 60}"/> <span class="muted" style="font-size:12px">built-in engine: cap source files reviewed</span></div>
      <div class="formrow"><label>Min confidence</label><select id="oh-minconf">${['low','medium','high'].map(v=>`<option value="${v}" ${((c.openhack.min_confidence||'low')===v)?'selected':''}>${v}</option>`).join('')}</select> <span class="muted" style="font-size:12px">drop lower-confidence candidates</span></div>
    </div>
    <div class="card">
      <h4>Scoring weights</h4>
      <p class="hint">Blended into the 0–100 composite (auto-normalized). KEV floor overrides the blend.</p>
      <div class="formrow"><label>Severity</label>${wnum('w-sev', w.severity)}</div>
      <div class="formrow"><label>Exploitability</label>${wnum('w-exp', w.exploitability)}</div>
      <div class="formrow"><label>Exposure</label>${wnum('w-exposure', w.exposure)}</div>
      <div class="formrow"><label>Chaining</label>${wnum('w-chain', w.chaining)}</div>
      <div class="formrow"><label>KEV floor</label><input type="number" id="kev-floor" value="${c.scoring.kev_floor}"/></div>
    </div>
    <div class="card">
      <h4>ServiceNow</h4>
      <div class="formrow"><label>Output format</label>${sel('sn-format', ['json', 'csv'], sn.format || 'json')}</div>
      <div class="formrow"><label>Push to instance</label><input type="checkbox" id="sn-push" ${sn.push ? 'checked' : ''}/></div>
      <div class="formrow ro"><label>Instance</label><span>${esc(sn.instance || '—')}</span></div>
      <div class="formrow ro"><label>Import table</label><span>${esc(sn.import_table)}</span></div>
      <div class="formrow ro"><label>Password</label><span>${esc(sn.password || '(unset)')}</span></div>
    </div>
    <div class="card">
      <h4>Connectors <span class="muted" style="font-weight:400">— secrets managed via environment</span></h4>
      <div class="formrow"><label>Repo source</label>${sel('scm-provider', c.options.scm_providers, c.source.provider)}</div>
      <div class="formrow"><label>GitHub repos</label><input type="text" id="gh-repos" style="width:360px" value="${esc((c.source.github_repos || []).join(', '))}" placeholder="owner/name, owner/other — empty = orgs / all"/></div>
      <div class="formrow"><label>GitHub orgs</label><input type="text" id="gh-orgs" style="width:360px" value="${esc((c.source.github_orgs || []).join(', '))}" placeholder="org1, org2 — used when repos is empty"/></div>
      <div class="formrow ro"><label>Bitbucket URL</label><span>${esc(cn.bitbucket.base_url || '—')}</span></div>
      <div class="formrow ro"><label>Bitbucket token</label><span>${esc(cn.bitbucket.token || '(unset)')}</span></div>
      <div class="formrow ro"><label>GitHub URL</label><span>${esc(cn.github.api_url || '—')}</span></div>
      <div class="formrow ro"><label>GitHub token</label><span>${esc(cn.github.token || '(unset)')}</span></div>
      <div class="formrow ro"><label>Snyk URL</label><span>${esc(cn.snyk.api_url || '—')}</span></div>
      <div class="formrow ro"><label>Snyk token</label><span>${esc(cn.snyk.token || '(unset)')}</span></div>
      <div class="formrow ro"><label>Xray URL</label><span>${esc(cn.xray.base_url || '—')}</span></div>
      <div class="formrow ro"><label>Xray token</label><span>${esc(cn.xray.token || '(unset)')}</span></div>
    </div>
    <button id="saveCfg">Save configuration</button>
    <span class="muted" style="margin-left:12px">Applies to the next scan. Persisted to config.overrides.json.</span>
  `;
  $('#saveCfg').addEventListener('click', saveConfig);
}
async function saveConfig() {
  const numOrNull = id => { const v = $('#' + id).value.trim(); return v === '' ? null : Number(v); };
  const tasks = {};
  CONFIG.options.routed_tasks.forEach(t => {
    tasks[t] = { provider: $('#task-' + t + '-provider').value, model: $('#task-' + t + '-model').value, effort: $('#task-' + t + '-effort').value, max_tokens: numOrNull('task-' + t + '-max') };
  });
  const update = {
    ai: { provider: $('#ai-provider').value, model: $('#ai-model').value, effort: $('#ai-effort').value, max_tokens: Number($('#ai-max').value), max_concurrency: Number($('#ai-conc').value), auto_route: $('#ai-auto').checked, tasks },
    enrichment: { kev_enabled: $('#en-kev').checked, epss_enabled: $('#en-epss').checked, reachability_enabled: $('#en-reach').checked, ai_enabled: $('#en-ai').checked },
    threat_model: { enabled: $('#tm-enabled').checked },
    feedback: { enabled: $('#fb-enabled').checked, prompt_history: $('#fb-prompt-history').checked },
    calibration: { alerts_enabled: $('#cal-alerts').checked },
    openhack: { enabled: $('#oh-enabled').checked, findings_dir: $('#oh-dir').value, repo: $('#oh-repo').value, auto: $('#oh-auto').checked, command: $('#oh-cmd').value, workspace: $('#oh-ws').value, clone: $('#oh-clone').checked, passes: Number($('#oh-passes').value), max_files: Number($('#oh-maxfiles').value), min_confidence: $('#oh-minconf').value },
    source: { provider: $('#scm-provider').value, github_repos: splitList($('#gh-repos').value), github_orgs: splitList($('#gh-orgs').value) },
    scoring: { weights: { severity: Number($('#w-sev').value), exploitability: Number($('#w-exp').value), exposure: Number($('#w-exposure').value), chaining: Number($('#w-chain').value) }, kev_floor: Number($('#kev-floor').value) },
    servicenow: { push: $('#sn-push').checked, format: $('#sn-format').value },
  };
  const r = await fetch('/api/config', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(update) });
  if (!r.ok) { toast('Save failed — check values', false); return; }
  CONFIG = await r.json();
  renderConfig();
  toast('Configuration saved');
}

fetch('/api/state').then(r => r.json()).then(p => { load(p); switchView('overview'); });
</script>
</body>
</html>
