# codescan configuration. Values here can reference ${ENV_VAR} for secrets.

ai:
  # Default tier — used by any AI task without a more specific override below.
  # provider selects the supplier (multi-provider harness): anthropic | openai |
  # google. `openai` also covers any OpenAI-compatible endpoint via OPENAI_BASE_URL.
  provider: anthropic
  # Set to claude-fable-5 for the hardest analysis (the client auto-enables
  # refusal fallbacks on Fable since security tooling can trip false-positive
  # classifier refusals).
  model: claude-opus-4-8
  effort: high            # low | medium | high | xhigh | max (Anthropic; ignored elsewhere)
  max_tokens: 32000

  # Per-task model routing: lower-cost models for mechanical work, deep models
  # for reasoning. Unset fields inherit the default tier above. Built-in defaults
  # (in llm.py) already route dedup -> Haiku, so this block is optional.
  tasks:
    dedup:                # semantic near-duplicate detection (mechanical)
      model: claude-haiku-4-5
      max_tokens: 8000    # note: Haiku ignores `effort`; the client omits it
    exploitability:       # per-finding exploitability + attack-chain reasoning
      model: claude-opus-4-8
      effort: xhigh
      # For the deepest chaining analysis, use:
      # model: claude-fable-5
      # Or route this task to a different supplier entirely:
      # provider: openai
      # model: gpt-5
      # provider: google
      # model: gemini-2.5-pro
    enrichment:           # AI remediation guidance + tags (lower-cost, mechanical)
      model: claude-haiku-4-5

# Which SCM provides the repo inventory (scan surface).
source:
  provider: github    # bitbucket | github

bitbucket:
  base_url: ${BITBUCKET_BASE_URL}
  token: ${BITBUCKET_TOKEN}
  # Restrict the scan surface. Empty projects list = all projects the token can see.
  projects: []           # e.g. ["PAY", "PLATFORM"]
  verify_tls: true

github:
  # github.com, or GitHub Enterprise Server: https://ghe.internal/api/v3
  api_url: ${GITHUB_API_URL}
  token: ${GITHUB_TOKEN}
  # Target scope, most specific first. Set `repos` to scan only those.
  repos: []              # e.g. ["acme/checkout"] — specific "owner/name" repos
  orgs: []               # whole orgs (used when repos is empty)
  verify_tls: true       # empty repos+orgs = all repos the token can see

snyk:
  api_url: ${SNYK_API_URL}
  token: ${SNYK_TOKEN}
  org_id: ${SNYK_ORG_ID}
  verify_tls: true

xray:
  base_url: ${XRAY_BASE_URL}
  token: ${XRAY_TOKEN}
  verify_tls: true

# OpenHack whitebox source review. Covers repos that Snyk/Xray haven't scanned by
# reviewing source directly. Three ways to use it (also settable in the config UI):
#   1. Built-in engine (default): with auto:true and an empty command, codescan
#      runs its own in-process review over the cloned source (needs AI enabled).
#   2. External command: point `command` at a separate OpenHack install.
#   3. Ingest only: point `findings_dir` at an existing OpenHack run's output.
openhack:
  enabled: false         # (mode 3) ingest findings from findings_dir
  findings_dir: ""       # e.g. runs/<target>/<run-id>  (or its finding-candidates/ dir)
  repo: ""               # owner/name — empty = the first scanned repo
  # Automatic invocation during a live scan.
  auto: false            # run OpenHack for the target repo, then ingest its output
  clone: true            # git clone the target repo first
  workspace: .openhack   # where to clone / run
  # Empty = codescan's built-in in-process engine. Set to shell out to an external
  # OpenHack instead; {repo_path} and {output_dir} are substituted and AI-provider
  # env vars pass through. e.g. ["bash", "run_openhack.sh", "{repo_path}", "{output_dir}"]
  command: []
  # Built-in engine tuning (ignored when `command` is set). Route model/effort via
  # ai.tasks.openhack (defaults to the deep default tier).
  max_files: 60          # cap source files reviewed per repo
  max_file_bytes: 60000  # skip files larger than this
  min_confidence: low    # drop candidates below this confidence: low | medium | high

servicenow:
  instance: ${SERVICENOW_INSTANCE}
  user: ${SERVICENOW_USER}
  password: ${SERVICENOW_PASSWORD}
  # If false, codescan writes the import payload to disk instead of POSTing.
  push: false
  # ServiceNow Vulnerable Item import target (Import Set / Vulnerability integration).
  import_table: sn_vul_vulnerable_item
  # Output format for the on-disk artifact: json (servicenow_import.json) or
  # csv (servicenow_import.csv, for CSV Import Sets). Also settable in the UI.
  format: json

enrichment:
  # CISA Known Exploited Vulnerabilities catalog.
  kev_url: https://www.cisa.gov/sites/default/files/feeds/known_exploited_vulnerabilities.json
  # FIRST EPSS API.
  epss_url: https://api.first.org/data/v1/epss
  # Toggle enrichers (also editable from the config UI). Deterministic enrichers
  # run first; the AI enricher adds remediation guidance + tags (needs AI on).
  kev_enabled: true
  epss_enabled: true
  reachability_enabled: true
  ai_enabled: false

# Per-service STRIDE threat modeling (AI, deep tier). Off by default — it's an
# extra call per service. Route it via ai.tasks.threat_model (defaults to the
# default tier; set to claude-fable-5 for the deepest analysis).
threat_model:
  enabled: true

scoring:
  # Weights for the composite 0-100 risk score. Must sum to 1.0.
  weights:
    severity: 0.30       # base CVSS-derived severity
    exploitability: 0.35 # AI + KEV + EPSS + reachability
    exposure: 0.20       # internet-facing / runtime reachable
    chaining: 0.15       # membership in a multi-step attack chain
  # A finding in the KEV catalog is floored to at least this score.
  kev_floor: 85
