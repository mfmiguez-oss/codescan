# codescan configuration. Values here can reference ${ENV_VAR} for secrets.

ai:
  # Default tier — used by any AI task without a more specific override below.
  # All models are served through Microsoft Foundry (the only provider): set
  # FOUNDRY_API_KEY + FOUNDRY_RESOURCE (or FOUNDRY_BASE_URL / AZURE_OPENAI_*
  # equivalents). `model` is the deployment name on your Foundry resource —
  # claude-* deployments use Anthropic's native Messages API; any other family
  # (OpenAI GPT, Mistral, ...) uses the resource's
  # OpenAI-compatible endpoint.
  provider: foundry
  # Set to claude-fable-5 for the hardest analysis (the client auto-enables
  # client-side refusal fallbacks on Fable since security tooling can trip
  # false-positive classifier refusals).
  model: claude-opus-4-7
  effort: medium            # low | medium | high | xhigh | max (Claude models; ignored elsewhere)
  max_tokens: 32000
  # Per-service AI calls (exploitability, threat modeling, enrichment, dedup,
  # OpenHack) run independently — this many at once. Cuts wall-clock time on large
  # multi-repo scans; latency-only (same requests/cost). 1 = sequential.
  max_concurrency: 4
  # Silent adaptive model selection. When true, each AI call is nudged up or down
  # the Claude ladder (Haiku→Sonnet→Opus→Fable) from its configured tier by how
  # hard the work is: trivial groups downgrade (cheaper), KEV/critical/large groups
  # upgrade (stronger). Off = deterministic tiers. Only moves Claude models on
  # the ladder; custom deployments and other model families are left as configured.
  auto_route: false

  # Per-task model routing: lower-cost models for mechanical work, deep models
  # for reasoning. Unset fields inherit the default tier above. Built-in defaults
  # (in llm.py) already route dedup -> Haiku, so this block is optional.
  tasks:
    dedup:                # semantic near-duplicate detection (mechanical)
      model: claude-haiku-4-5
      max_tokens: 8000    # note: Haiku ignores `effort`; the client omits it
    exploitability:       # per-finding exploitability + attack-chain reasoning
      model: claude-opus-4-7
      effort: medium
      # For the deepest chaining analysis, use:
      # model: claude-fable-5
      # Or route this task to a different model family on your Foundry resource:
      # model: gpt-5
      # model: mistral-large-2411
    enrichment:           # AI remediation guidance + tags (lower-cost, mechanical)
      model: claude-haiku-4-5

# Which SCM provides the repo inventory (scan surface).
source:
  provider: bitbucket    # bitbucket | github

bitbucket:
  base_url: ${BITBUCKET_BASE_URL}
  token: ${BITBUCKET_TOKEN}
  # Restrict the scan surface. Empty projects list = all projects the token can see.
  projects: []           # e.g. ["PAY", "PLATFORM"]
  verify_tls: true

github:
  # github.com, or GitHub Enterprise Server: https://ghe.internal/api/v3
  api_url: ${GITHUB_API_URL}
  token: ${GITHUB_TOKEN}
  # Target scope, most specific first. Set `repos` to scan only those.
  repos: []              # e.g. ["acme/checkout"] — specific "owner/name" repos
  orgs: []               # whole orgs (used when repos is empty)
  verify_tls: true       # empty repos+orgs = all repos the token can see

# Snyk / Xray are the SCA/CVE finding sources. Each is used only when its
# credentials are set — an unconfigured source is skipped (not an error), so a
# scan can run on whichever sources are wired up (e.g. a whitebox-only GitHub
# scan with `codescan scan --repo owner/name --whitebox` and no Snyk/Xray).
snyk:
  api_url: ${SNYK_API_URL}
  token: ${SNYK_TOKEN}
  org_id: ${SNYK_ORG_ID}
  verify_tls: true

xray:
  base_url: ${XRAY_BASE_URL}
  token: ${XRAY_TOKEN}
  verify_tls: true

# OpenHack whitebox source review. Covers repos that Snyk/Xray haven't scanned by
# reviewing source directly. Three ways to use it (also settable in the config UI):
#   1. Built-in engine (default): with auto:true and an empty command, codescan
#      runs its own in-process review over the cloned source (needs AI enabled).
#   2. External command: point `command` at a separate OpenHack install.
#   3. Ingest only: point `findings_dir` at an existing OpenHack run's output.
openhack:
  enabled: false         # (mode 3) ingest findings from findings_dir
  findings_dir: ""       # e.g. runs/<target>/<run-id>  (or its finding-candidates/ dir)
  repo: ""               # owner/name — empty = the first scanned repo
  # Automatic invocation during a live scan.
  auto: false            # run OpenHack for the target repo, then ingest its output
  clone: true            # git clone the target repo first
  workspace: .openhack   # where to clone / run
  # Empty = codescan's built-in in-process engine. Set to shell out to an external
  # OpenHack instead; {repo_path} and {output_dir} are substituted and AI-provider
  # env vars pass through. e.g. ["bash", "run_openhack.sh", "{repo_path}", "{output_dir}"]
  command: []
  # Built-in engine tuning (ignored when `command` is set). Route model/effort via
  # ai.tasks.openhack (defaults to the deep default tier).
  passes: 2              # independent review passes; >=2 unions findings (higher
                         # recall) and flags cross-pass agreement. 1 = single pass.
  # Route each pass to a different model on the Foundry resource so the passes are
  # genuinely independent — diverse model families miss different things, so the
  # union catches more and a cross-model agreement (multi-model tag) is a stronger
  # signal. Pass i uses pass_models[i % len]; unset fields inherit the openhack
  # task tier. Empty = every pass uses the same routed model. A failing pass is
  # skipped, not fatal.
  pass_models: []
    # - { model: claude-opus-4-8 }
    # - { model: gpt-5 }
    # - { model: mistral-large-2411 }
  max_files: 60          # cap source files reviewed per repo
  max_file_bytes: 60000  # skip files larger than this
  min_confidence: medium    # drop candidates below this confidence: low | medium | high

servicenow:
  instance: ${SERVICENOW_INSTANCE}
  user: ${SERVICENOW_USER}
  password: ${SERVICENOW_PASSWORD}
  # If false, codescan writes the import payload to disk instead of POSTing.
  push: false
  # ServiceNow Vulnerable Item import target (Import Set / Vulnerability integration).
  import_table: sn_vul_vulnerable_item
  # Output format for the on-disk artifact: json (servicenow_import.json) or
  # csv (servicenow_import.csv, for CSV Import Sets). Also settable in the UI.
  format: csv

enrichment:
  # CISA Known Exploited Vulnerabilities catalog.
  kev_url: https://www.cisa.gov/sites/default/files/feeds/known_exploited_vulnerabilities.json
  # FIRST EPSS API.
  epss_url: https://api.first.org/data/v1/epss
  # Toggle enrichers (also editable from the config UI). Deterministic enrichers
  # run first; the AI enricher adds remediation guidance + tags (needs AI on).
  kev_enabled: true
  epss_enabled: true
  reachability_enabled: true
  ai_enabled: false

# Per-service STRIDE threat modeling (AI, deep tier). On by default (only runs
# when the AI stages are enabled) — set false to skip the extra call per service.
# Route it via ai.tasks.threat_model (defaults to the default tier; set to
# claude-fable-5 for the deepest analysis).
threat_model:
  enabled: true

# Optional: pull secrets from HashiCorp Vault into the environment before the
# ${ENV} interpolation above runs, so every token/password below resolves from
# Vault with no other change. Needs `pip install 'codescan[vault]'` (hvac). The
# Vault bootstrap creds themselves come from the environment.
vault:
  enabled: false
  address: ${VAULT_ADDR}       # empty -> hvac uses VAULT_ADDR
  namespace: ""                # Vault Enterprise namespace (optional)
  auth: token                  # token | approle
  token: ${VAULT_TOKEN}        # for auth: token (empty -> hvac uses VAULT_TOKEN)
  role_id: ${VAULT_ROLE_ID}    # for auth: approle
  secret_id: ${VAULT_SECRET_ID}
  kv_mount: secret             # KV secrets-engine mount point
  kv_version: 2                # 1 | 2
  # Secret paths under the mount; each secret's keys become env vars (e.g. a
  # secret at secret/codescan with an ANTHROPIC_API_KEY key sets that env var).
  paths: ["codescan"]
  override_env: false          # false = an already-set env var wins

# Where the validation-state store persists. "file" (default) = local JSON, right
# for a single instance (mount /data to keep it). "sql" = a shared database so
# multiple replicas / concurrent runners share one durable store (HA). Needs
# `pip install 'codescan[sql]'` (SQLAlchemy) + a driver for Postgres (e.g. psycopg).
storage:
  backend: file          # file | sql
  # SQLAlchemy URL for backend=sql (interpolate the secret from the environment):
  #   dsn: ${STATE_DB_DSN}   # e.g. postgresql+psycopg://user:pass@db:5432/codescan
  dsn: ""

# Append-only audit log (JSONL) of key events — scan runs, config changes, and
# validation-state changes — each with an actor + UTC timestamp. Viewable in the
# UI's Audit tab and at GET /api/audit. Actor comes from your SSO/reverse-proxy
# identity header (X-Remote-User / X-Forwarded-User) when present.
audit:
  enabled: true
  path: audit.jsonl      # local JSONL sink (relative -> /data). "" = push-only.
  # Ship to a SIEM (best-effort; the file stays the durable local record). The file
  # is also tail-able by any forwarder (Filebeat/Fluent Bit/Vector).
  syslog:                # classic SIEM path (Splunk/QRadar/ArcSight/rsyslog)
    enabled: false
    address: siem.internal:514   # host:port, or a socket path like /dev/log
    protocol: udp        # udp | tcp
    facility: user
  http:                  # Splunk HEC / Elastic / Datadog / generic webhook
    enabled: false
    url: ""              # e.g. https://splunk:8088/services/collector/event
    token: ${AUDIT_HTTP_TOKEN}
    token_prefix: "Splunk "      # "Splunk " for HEC, "Bearer " for others
    event_key: event     # wrap as {event: ...} for Splunk HEC; "" for a raw webhook

scoring:
  # Weights for the composite 0-100 risk score. Must sum to 1.0.
  weights:
    severity: 0.30       # base CVSS-derived severity
    exploitability: 0.35 # AI + KEV + EPSS + reachability
    exposure: 0.20       # internet-facing / runtime reachable
    chaining: 0.15       # membership in a multi-step attack chain
  # A finding in the KEV catalog is floored to at least this score.
  kev_floor: 85

# Analyst-feedback loop: learn from persisted confirm / false-positive decisions to
# nudge the risk score of new, similar findings (same weakness family or component).
# Bounded and explainable — every adjusted finding gets a reason in its rationale, a
# feedback-adjusted tag, and a count in the scan's audit event; it never overrides an
# analyst's state and never pushes a KEV finding below kev_floor. No-op until there's
# manual triage history to learn from.
feedback:
  enabled: true
  max_adjust: 15       # cap the +/- score nudge (points)
  min_evidence: 2      # need at least this many prior manual decisions for a weakness/component
  # Also feed the history into the AI exploitability prompt (prior_analyst_decisions
  # per finding), so the model reasons with the org's ground truth instead of only
  # being corrected by it afterwards.
  prompt_history: true
  # Evidence weighting: confidence grows with volume (shrinkage pseudo-count),
  # old decisions fade (half-life), and same-repo decisions outweigh estate-wide.
  shrinkage: 3         # 0 restores raw-consensus scaling
  half_life_days: 180  # a decision's weight halves every N days; 0 disables decay
  same_repo_boost: 2   # weight multiplier for decisions from the finding's repo

# Calibration drift alerting: each scan grades past risk scores against analysts'
# confirm / false-positive decisions; if calibration degrades past these thresholds
# the scan emits a `calibration.drift` audit event (forwarded to the SIEM sinks)
# and the UI Calibration tab shows the alert. Checks stay silent below
# min_bucket_decisions of evidence, so no alerts fire until enough triage
# history exists.
calibration:
  alerts_enabled: true
  min_bucket_decisions: 5      # evidence needed before a check can fire
  min_high_confirm_rate: 0.5   # 80-100 bucket confirm rate below this -> drift
  min_separation: 0.0          # confirmed-vs-FP mean-score gap below this -> drift

# Web-server resource controls (defense against unbounded LLM/resource
# consumption — OWASP LLM04/10). Rate limiting throttles /api/* per client so a
# runaway loop or hostile caller can't drive unbounded scan/LLM cost; the
# per-scan ceiling bounds the cost of any single run (highest-severity findings
# are kept when it truncates). Applied at server startup.
server:
  rate_limit_enabled: true
  rate_limit_rpm: 60           # sustained requests/min per client to /api/*
  rate_limit_burst: 20         # extra requests allowed in a short spike
  max_findings_per_scan: 5000  # hard cap per scan; 0 = unlimited
