name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: lint · types · tests (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install
        run: pip install -e ".[dev]"
      - name: Ruff (lint)
        run: ruff check src tests
      - name: mypy (types)
        run: mypy
      - name: pytest
        run: pytest -q

  supply-chain:
    name: dependency audit · SBOM
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install (with providers + extras for a complete dependency graph)
        run: pip install -e ".[dev,providers,vault,sql]"
      - name: Dependency vulnerability audit (pip-audit)
        # codescan scans others; it must scan its own dependencies. Non-blocking
        # for now (advisory) so a new upstream CVE doesn't wedge the pipeline;
        # tighten to a gate once the baseline is clean.
        run: |
          pip install pip-audit
          pip-audit --strict --desc || echo "::warning::pip-audit reported findings (advisory)"
      - name: Generate CycloneDX SBOM
        run: |
          pip install cyclonedx-bom
          cyclonedx-py environment --output-format JSON --output sbom.json
      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v4
        with:
          name: codescan-sbom
          path: sbom.json

  docker:
    name: docker build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build image
        run: docker build -t codescan:ci .
