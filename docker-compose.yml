services:
  codescan:
    build: .
    image: codescan:latest
    ports:
      - "8000:8000"
    environment:
      CODESCAN_HOST: "0.0.0.0"
      CODESCAN_PORT: "8000"
      # Enable the AI stages (exploitability, chaining, threat modeling,
      # semantic dedup, AI enrichment). Requires FOUNDRY_API_KEY + FOUNDRY_RESOURCE below.
      CODESCAN_AI: "false"
      # Scan live Bitbucket/Snyk/Xray instead of the bundled sample fixtures.
      # Requires the connector credentials below.
      CODESCAN_LIVE: "false"
    # Secrets come from the environment (config uses ${ENV} interpolation).
    # Copy .env.example -> .env and fill it in (FOUNDRY_API_KEY + FOUNDRY_RESOURCE
    # at minimum for the AI stages). Optional: the offline fixtures demo runs
    # without one.
    env_file:
      - path: .env
        required: false
    volumes:
      # Persist outputs, validation state, and config overrides.
      - codescan-data:/data
      # Optional: mount your own config over the baked-in default.
      # - ./config:/app/config:ro
    restart: unless-stopped

volumes:
  codescan-data:
